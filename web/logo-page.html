<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>דף לוגו | קמפוס גאולים המסילה</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&family=Rubik:wght@500;700;800;900&display=swap");

    :root {
      --blue: #1f355e;
      --blue-deep: #111d33;
      --olive: #8a9746;
      --olive-dark: #65712d;
      --sand: #d8c7a0;
      --cream: #f8f6f1;
      --muted: #657082;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--blue-deep);
      font-family: "Assistant", "Segoe UI", Arial, sans-serif;
    }

    .logo-page {
      position: relative;
      width: min(100vw, 1440px);
      min-height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background: #ffffff;
      border: 1px solid rgba(31, 53, 94, 0.12);
      isolation: isolate;
    }

    .mark {
      position: absolute;
      top: clamp(34px, 6vh, 90px);
      right: clamp(34px, 7vw, 108px);
      width: clamp(280px, 32vw, 520px);
    }

    .mark img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 18px 28px rgba(17, 29, 51, 0.08));
    }

    .dot-field {
      position: absolute;
      top: clamp(30px, 5vh, 72px);
      left: clamp(36px, 7vw, 96px);
      display: grid;
      grid-template-columns: repeat(6, 10px);
      grid-auto-rows: 10px;
      gap: 25px;
      opacity: 0.95;
    }

    .dot-field span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--sand);
    }

    .dot-field span:nth-child(6n + 1),
    .dot-field span:nth-child(6n + 5) {
      background: var(--olive);
    }

    .dot-field span:nth-child(6n + 6),
    .dot-field span:nth-child(6n + 4) {
      background: var(--olive-dark);
    }

    .route {
      position: absolute;
      right: 0;
      bottom: clamp(138px, 14vh, 182px);
      left: 0;
      height: 160px;
      pointer-events: none;
    }

    .route svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .route-path-shadow {
      fill: none;
      stroke: rgba(31, 53, 94, 0.10);
      stroke-width: 8;
      stroke-linecap: round;
    }

    .route-path {
      fill: none;
      stroke: var(--blue-deep);
      stroke-width: 4;
      stroke-linecap: round;
    }

    .contact-strip {
      position: absolute;
      right: clamp(34px, 6vw, 86px);
      bottom: clamp(28px, 5vh, 62px);
      left: clamp(34px, 6vw, 86px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vw, 34px);
      color: var(--blue-deep);
      font-size: clamp(17px, 1.8vw, 28px);
      font-weight: 700;
      direction: ltr;
      text-align: center;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .contact-icon {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      color: var(--olive);
    }

    .divider {
      width: 2px;
      height: 36px;
      background: var(--olive-dark);
      opacity: 0.8;
    }

    .page-note {
      position: absolute;
      right: clamp(34px, 6vw, 86px);
      bottom: 18px;
      color: rgba(17, 29, 51, 0.38);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 780px) {
      .logo-page {
        min-height: 100svh;
      }

      .mark {
        top: 54px;
        right: 50%;
        width: min(78vw, 420px);
        transform: translateX(50%);
      }

      .dot-field {
        top: 28px;
        left: 24px;
        grid-template-columns: repeat(5, 8px);
        grid-auto-rows: 8px;
        gap: 16px;
        opacity: 0.72;
      }

      .route {
        bottom: 156px;
        height: 120px;
      }

      .contact-strip {
        flex-direction: column;
        gap: 10px;
        font-size: 18px;
        bottom: 34px;
      }

      .divider {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="logo-page" aria-label="דף לוגו קמפוס גאולים המסילה">
    <div class="mark">
      <img src="assets/gaolim-logo-official-float-cropped.png" alt="קמפוס גאולים המסילה - למידה שיוצאת מגבולות הכיתה">
    </div>

    <div class="dot-field" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="route" aria-hidden="true">
      <svg viewBox="0 0 1440 180" preserveAspectRatio="none">
        <path class="route-path-shadow" d="M-18 86 C112 45 238 126 355 73 C475 18 596 148 724 80 C842 17 948 12 1058 88 C1170 166 1287 126 1456 28"></path>
        <path class="route-path" d="M-18 86 C112 45 238 126 355 73 C475 18 596 148 724 80 C842 17 948 12 1058 88 C1170 166 1287 126 1456 28"></path>
        <circle cx="205" cy="101" r="23" fill="#1f355e"></circle>
        <circle cx="512" cy="74" r="22" fill="#8a9746"></circle>
        <circle cx="768" cy="78" r="10" fill="#8a9746"></circle>
        <circle cx="1007" cy="44" r="23" fill="#d8c7a0"></circle>
        <circle cx="1110" cy="91" r="10" fill="#d8c7a0"></circle>
        <circle cx="1403" cy="38" r="12" fill="#f0d9ad"></circle>
      </svg>
    </div>

    <address class="contact-strip">
      <span class="contact-item">
        <span class="contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.77.63 2.6a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.48-1.2a2 2 0 0 1 2.11-.45c.83.3 1.7.51 2.6.63A2 2 0 0 1 22 16.92Z"></path>
          </svg>
        </span>
        <span>02-1234567</span>
      </span>
      <span class="divider" aria-hidden="true"></span>
      <span class="contact-item">
        <span class="contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <path d="m3 7 9 6 9-6"></path>
          </svg>
        </span>
        <span>info@gaonim-hamesila.edu.il</span>
      </span>
      <span class="divider" aria-hidden="true"></span>
      <span class="contact-item" dir="rtl">
        <span class="contact-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
        </span>
        <span>רח׳ גאולים 15, בקעה, ירושלים</span>
      </span>
    </address>

    <div class="page-note">תבנית דף לוגו לשימוש במצגת ובחומרי המשך</div>
  </main>
</body>
</html>
