<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>קמפוס גאולים המסילה | מצגת אינטראקטיבית</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&family=Rubik:wght@500;700;800;900&display=swap");

    :root {
      --blue: #1f355e;
      --blue-deep: #111d33;
      --olive: #8a9746;
      --olive-dark: #65712d;
      --sand: #d8c7a0;
      --cream: #f8f6f1;
      --white: #ffffff;
      --ink: #1b2638;
      --muted: #687386;
      --line: rgba(31, 53, 94, 0.1);
      --shadow: 0 14px 34px rgba(17, 29, 51, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      background: var(--white);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background: var(--white);
      font-family: "Assistant", "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    button,
    a {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .deck {
      position: relative;
      min-height: 100svh;
      isolation: isolate;
    }

    .deck-frame {
      position: fixed;
      inset: 18px;
      z-index: 0;
      border: 1px solid rgba(31, 53, 94, 0.08);
      border-radius: 6px;
      pointer-events: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      min-height: 100svh;
      padding: 24px clamp(24px, 5vw, 72px) 24px;
      background: var(--white);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 260ms ease, visibility 260ms ease;
      overflow: hidden;
    }

    .slide.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .slide:not(.cover):not(.closing)::before {
      content: "";
      position: absolute;
      z-index: 0;
      left: clamp(40px, 8vw, 140px);
      bottom: clamp(32px, 6vh, 84px);
      width: clamp(260px, 34vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(216, 199, 160, 0.12);
      pointer-events: none;
    }

    .visual-brandApplications::before {
      display: none;
    }

    .visual-brandApplications .slide-body {
      gap: 18px;
      padding-top: clamp(16px, 3vh, 32px);
    }

    .visual-brandApplications .copy {
      width: min(880px, 100%);
      max-width: 880px;
    }

    .slide:not(.cover):not(.closing)::after {
      content: "";
      position: absolute;
      z-index: 0;
      top: clamp(88px, 12vh, 140px);
      left: clamp(42px, 7vw, 120px);
      width: 176px;
      height: 146px;
      opacity: 0.28;
      background-image: radial-gradient(circle, var(--sand) 0 5px, transparent 5.5px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .slide-header,
    .slide-footer {
      position: relative;
      z-index: 3;
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .slide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      min-height: 52px;
    }

    .logo {
      width: clamp(104px, 12vw, 148px);
    }

    .logo.dark {
      width: clamp(122px, 14vw, 168px);
    }

    .pre-brand .logo,
    .hide-logo .logo {
      visibility: hidden;
    }

    .slide-number {
      margin-inline-start: auto;
      color: rgba(104, 115, 134, 0.82);
      font-family: "Rubik", "Assistant", sans-serif;
      font-size: 15px;
      line-height: 1;
      font-weight: 800;
    }

    .dark-slide .slide-number {
      color: rgba(255, 255, 255, 0.7);
    }

    .slide-body {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr;
      align-content: start;
      gap: clamp(20px, 3vw, 36px);
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: clamp(22px, 5vh, 54px) 0 86px;
    }

    .cover .slide-body,
    .closing .slide-body {
      grid-template-columns: 1fr;
    }

    .cover .slide-body {
      grid-template-columns: 1fr;
      align-items: start;
      padding-bottom: 190px;
    }

    .cover .copy {
      max-width: 720px;
    }

    .cover .visual {
      display: none;
    }

    .closing .copy {
      width: min(920px, 100%);
      max-width: 920px;
    }

    .closing h1 {
      max-width: 12ch;
      font-size: clamp(58px, 8vw, 110px);
      line-height: 0.95;
    }

    .closing .tagline {
      font-size: clamp(26px, 3.2vw, 46px);
    }

    .closing .lead {
      font-size: clamp(24px, 2.8vw, 40px);
      font-weight: 850;
    }

    .dark-slide {
      color: var(--white);
      background: var(--blue-deep);
    }

    .dark-slide::before {
      background: rgba(216, 199, 160, 0.08);
    }

    .dark-slide::after {
      background-image: radial-gradient(circle, rgba(216, 199, 160, 0.55) 0 5px, transparent 5.5px);
    }

    .dark-slide .deck-frame,
    .dark-slide::before {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .copy {
      width: min(760px, 100%);
      max-width: 760px;
      justify-self: end;
      text-align: right;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
      color: var(--olive-dark);
      font-size: clamp(13px, 1.05vw, 16px);
      font-weight: 900;
    }

    .dark-slide .eyebrow {
      color: var(--sand);
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 2px;
      background: currentColor;
    }

    h1,
    h2,
    h3 {
      font-family: "Rubik", "Assistant", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }

    h1,
    h2 {
      margin: 0;
      color: var(--blue-deep);
      font-weight: 900;
      line-height: 0.96;
    }

    .dark-slide h1,
    .dark-slide h2 {
      color: var(--white);
    }

    h1 {
      max-width: 12ch;
      font-size: clamp(40px, 5.2vw, 66px);
    }

    h2 {
      max-width: 14ch;
      font-size: clamp(30px, 3.7vw, 48px);
    }

    .copy h1,
    .copy h2 {
      margin-right: 0;
      margin-left: auto;
    }

    .wide-title h2 {
      max-width: 15ch;
    }

    .single-line-title h2 {
      max-width: none;
      white-space: nowrap;
      font-size: clamp(30px, 3.2vw, 44px);
    }

    .tagline {
      margin: 18px 0 0;
      color: var(--olive-dark);
      font-family: "Rubik", "Assistant", sans-serif;
      font-size: clamp(20px, 2.2vw, 30px);
      line-height: 1.14;
      font-weight: 900;
    }

    .dark-slide .tagline {
      color: var(--sand);
    }

    .lead,
    .copy p,
    .text-block p {
      color: var(--muted);
      font-size: clamp(16px, 1.22vw, 19px);
      line-height: 1.55;
      font-weight: 600;
    }

    .lead,
    .copy p {
      margin: 22px 0 0;
    }

    .dark-slide .lead,
    .dark-slide .copy p {
      color: rgba(255, 255, 255, 0.78);
    }

    .emphasis {
      display: inline-block;
      color: var(--blue-deep);
      font-weight: 900;
    }

    .large-emphasis .emphasis {
      max-width: 16ch;
      font-family: "Rubik", "Assistant", sans-serif;
      font-size: clamp(28px, 3.2vw, 48px);
      line-height: 1.06;
    }

    .dark-slide .emphasis {
      color: var(--sand);
    }

    .visual {
      position: relative;
      min-height: auto;
      width: 100%;
    }

    .statement-visual {
      display: none;
    }

    .cover-logo {
      display: grid;
      min-height: 330px;
      place-items: center;
    }

    .cover-logo img {
      width: min(100%, 360px);
      filter: drop-shadow(0 14px 22px rgba(17, 29, 51, 0.1));
      animation: rise-in 850ms ease both;
    }

    .dark-slide .cover-logo img {
      filter: drop-shadow(0 26px 34px rgba(0, 0, 0, 0.24));
    }

    .dot-grid {
      position: absolute;
      top: 8%;
      left: 5%;
      display: grid;
      grid-template-columns: repeat(6, 8px);
      grid-auto-rows: 8px;
      gap: 15px;
      opacity: 0.55;
    }

    .dot-grid span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sand);
    }

    .dark-slide .dot-grid span:nth-child(3n) {
      background: var(--olive);
    }

    .line-art {
      position: absolute;
      right: 0;
      bottom: 10%;
      left: 4%;
      height: 104px;
    }

    .line-art svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .route-base {
      fill: none;
      stroke: rgba(31, 53, 94, 0.1);
      stroke-width: 6;
      stroke-linecap: round;
    }

    .route-line {
      fill: none;
      stroke: var(--blue-deep);
      stroke-width: 2.7;
      stroke-linecap: round;
    }

    .cover.is-active .line-art .route-line,
    .closing.is-active .line-art .route-line {
      stroke-dasharray: 720;
      stroke-dashoffset: 720;
      animation: draw-route 1.8s 240ms ease forwards;
    }

    .cover.is-active .line-art circle,
    .closing.is-active .line-art circle {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: soft-pop 520ms ease forwards;
    }

    .cover.is-active .line-art circle:nth-of-type(1),
    .closing.is-active .line-art circle:nth-of-type(1) {
      animation-delay: 780ms;
    }

    .cover.is-active .line-art circle:nth-of-type(2),
    .closing.is-active .line-art circle:nth-of-type(2) {
      animation-delay: 1.08s;
    }

    .cover.is-active .line-art circle:nth-of-type(3),
    .closing.is-active .line-art circle:nth-of-type(3) {
      animation-delay: 1.34s;
    }

    .dark-slide .route-base {
      stroke: rgba(255, 255, 255, 0.16);
    }

    .dark-slide .route-line {
      stroke: var(--white);
    }

    .cover-route {
      position: absolute;
      right: 0;
      bottom: 96px;
      left: 0;
      z-index: 2;
      height: 220px;
      cursor: pointer;
      pointer-events: auto;
    }

    .cover-route:hover .route-line {
      stroke: var(--blue);
    }

    .cover-route svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .cover-route .route-base {
      stroke: rgba(211, 197, 181, 0.45);
      stroke-width: 8;
    }

    .cover-route .route-line {
      stroke: var(--blue-deep);
      stroke-width: 4;
      stroke-dasharray: 1500;
      stroke-dashoffset: 1500;
    }

    .cover-route::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 70px;
      left: 0;
      height: 74px;
      background: linear-gradient(180deg, rgba(211, 197, 181, 0), rgba(211, 197, 181, 0.12));
      opacity: 0.75;
      pointer-events: none;
    }

    .cover.is-active .cover-route .route-line {
      animation: draw-route 2s 260ms ease forwards;
    }

    .cover-route circle {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
    }

    .cover.is-active .cover-route circle {
      animation: soft-pop 520ms ease forwards;
    }

    .cover.is-active .cover-route circle:nth-of-type(1) {
      animation-delay: 860ms;
    }

    .cover.is-active .cover-route circle:nth-of-type(2) {
      animation-delay: 1.14s;
    }

    .cover.is-active .cover-route circle:nth-of-type(3) {
      animation-delay: 1.42s;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      width: min(760px, 100%);
      justify-self: end;
    }

    .mini-card,
    .anchor-card,
    .step-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(248, 246, 241, 0.72));
      box-shadow: 0 18px 42px rgba(17, 29, 51, 0.045);
      overflow: hidden;
      --card-accent: var(--olive);
      --card-soft: rgba(96, 122, 68, 0.08);
    }

    .mini-card {
      min-height: 104px;
      padding: 16px;
    }

    .mini-card::before,
    .anchor-card::before,
    .step-card::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 5px;
      background: var(--card-accent);
    }

    .mini-card::after,
    .anchor-card::after,
    .step-card::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: 16px;
      width: 62px;
      height: 18px;
      opacity: 0.6;
      background:
        radial-gradient(circle at 10% 55%, var(--card-accent) 0 4px, transparent 4.5px),
        radial-gradient(circle at 50% 45%, var(--sand) 0 3px, transparent 3.5px),
        radial-gradient(circle at 88% 58%, var(--blue-deep) 0 3px, transparent 3.5px);
    }

    .mini-card:nth-child(4n + 1),
    .anchor-card:nth-child(4n + 1),
    .step-card:nth-child(4n + 1) {
      --card-accent: var(--blue-deep);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(26, 37, 60, 0.045));
    }

    .mini-card:nth-child(4n + 2),
    .anchor-card:nth-child(4n + 2),
    .step-card:nth-child(4n + 2) {
      --card-accent: var(--olive);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(96, 122, 68, 0.075));
    }

    .mini-card:nth-child(4n + 3),
    .anchor-card:nth-child(4n + 3),
    .step-card:nth-child(4n + 3) {
      --card-accent: var(--sand);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(216, 199, 160, 0.18));
    }

    .mini-card:nth-child(4n),
    .anchor-card:nth-child(4n),
    .step-card:nth-child(4n) {
      --card-accent: #8a9746;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(248, 246, 241, 0.92));
    }

    .mini-card strong,
    .anchor-card strong,
    .step-card strong {
      position: relative;
      z-index: 1;
      display: block;
      color: var(--blue-deep);
      font-size: 17px;
      line-height: 1.2;
      font-weight: 900;
    }

    .mini-card p,
    .anchor-card p,
    .step-card p {
      position: relative;
      z-index: 1;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.4;
      font-weight: 650;
    }

    .list-panel {
      display: grid;
      gap: 12px;
      width: min(760px, 100%);
      justify-self: end;
      padding: 26px 28px 34px;
      border: 1px solid rgba(31, 53, 94, 0.1);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(248,246,241,0.78)),
        radial-gradient(circle at 8% 88%, rgba(216,199,160,0.22), transparent 34%);
      box-shadow: 0 20px 52px rgba(17, 29, 51, 0.055);
      position: relative;
      overflow: hidden;
    }

    .list-panel::after {
      content: "";
      position: absolute;
      right: 28px;
      left: 28px;
      bottom: 16px;
      height: 18px;
      opacity: 0.42;
      background:
        radial-gradient(circle at 20% 50%, var(--olive) 0 5px, transparent 5.5px),
        radial-gradient(circle at 50% 50%, var(--blue) 0 5px, transparent 5.5px),
        radial-gradient(circle at 78% 50%, var(--sand) 0 5px, transparent 5.5px);
    }

    .list-item {
      display: grid;
      grid-template-columns: 14px 1fr;
      align-items: start;
      gap: 12px;
      color: var(--blue-deep);
      font-size: clamp(16px, 1.18vw, 19px);
      line-height: 1.38;
      font-weight: 850;
    }

    .list-item::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 10px;
      border-radius: 50%;
      background: var(--olive);
    }

    .question-card {
      position: relative;
      margin-top: 26px;
      padding: 24px 28px;
      color: var(--white);
      border-radius: 8px;
      background: var(--blue-deep);
      overflow: hidden;
    }

    .question-card strong {
      position: relative;
      z-index: 1;
      display: block;
      font-family: "Rubik", "Assistant", sans-serif;
      font-size: clamp(28px, 3.1vw, 46px);
      line-height: 1.08;
    }

    .quote-card {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 260px;
      padding: 46px 32px 68px;
      color: var(--blue-deep);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,0.94), rgba(248,246,241,0.76));
      border: 1px solid rgba(31, 53, 94, 0.08);
      box-shadow: 0 20px 52px rgba(17, 29, 51, 0.045);
      overflow: hidden;
    }

    .quote-card::before {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--blue), var(--olive), var(--sand));
    }

    .quote-card strong {
      position: relative;
      z-index: 1;
      max-width: 13ch;
      font-family: "Rubik", "Assistant", sans-serif;
      font-size: clamp(30px, 3.7vw, 48px);
      line-height: 1.02;
      font-weight: 900;
      text-align: center;
    }

    .statement-visual .dot-grid {
      top: 2%;
      left: 8%;
      opacity: 0.28;
    }

    .statement-visual .line-art {
      right: 4%;
      bottom: -2px;
      left: 2%;
      height: 72px;
      opacity: 0.48;
    }

    .neighborhood-visual {
      width: min(980px, 100%);
      height: 170px;
      justify-self: end;
      align-self: end;
      margin-top: clamp(70px, 12vh, 140px);
      overflow: hidden;
    }

    .neighborhood-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
    }

    .flow {
      display: grid;
      gap: 14px;
      align-content: center;
      width: min(760px, 100%);
      justify-self: end;
    }

    .flow-step {
      display: grid;
      grid-template-columns: 56px 1fr;
      align-items: center;
      gap: 16px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(248, 246, 241, 0.7);
      border: 1px solid var(--line);
    }

    .flow-step img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .flow-step strong {
      color: var(--blue-deep);
      font-size: 18px;
      line-height: 1.15;
      font-weight: 900;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      color: var(--blue-deep);
      font-weight: 900;
      border: 1px solid rgba(138, 151, 70, 0.28);
      border-radius: 999px;
      background: rgba(248, 246, 241, 0.72);
    }

    .anchor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      width: min(820px, 100%);
      justify-self: end;
    }

    .anchor-card {
      min-height: 150px;
      padding: 18px;
    }

    .anchor-card img {
      width: 58px;
      height: 58px;
      margin-bottom: 12px;
      object-fit: contain;
    }

    .benefit-orbit {
      position: relative;
      min-height: 300px;
      display: grid;
      place-items: center;
      width: min(760px, 100%);
      justify-self: end;
    }

    .orbit-ring {
      position: absolute;
      width: min(90%, 420px);
      aspect-ratio: 1;
      border: 2px solid rgba(31, 53, 94, 0.12);
      border-radius: 50%;
    }

    .orbit-center {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 142px;
      height: 142px;
      color: var(--white);
      border-radius: 50%;
      background: var(--blue-deep);
      box-shadow: var(--shadow);
      text-align: center;
      font-family: "Rubik", "Assistant", sans-serif;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
    }

    .orbit-chip {
      position: absolute;
      display: grid;
      place-items: center;
      width: 94px;
      height: 94px;
      padding: 12px;
      border-radius: 50%;
      color: var(--blue-deep);
      background: var(--cream);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(17, 29, 51, 0.09);
      text-align: center;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 900;
    }

    .orbit-chip:nth-child(3) { top: 4%; right: 38%; }
    .orbit-chip:nth-child(4) { top: 24%; right: 5%; }
    .orbit-chip:nth-child(5) { bottom: 14%; right: 13%; }
    .orbit-chip:nth-child(6) { bottom: 6%; left: 28%; }
    .orbit-chip:nth-child(7) { top: 28%; left: 5%; }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;

      height: 100%;

      z-index: 40;

      place-items: center;
      position: absolute;
      top: 50%;
      width: 42px;
      height: 42px;

      border-radius: 6px;
      background: rgba(255, 255, 255, 0.7);

      font-weight: 900;

      backdrop-filter: blur(10px);

      left: 22px;

      to { stroke-dashoffset: 0; }
    }

      from { opacity: 0; transform: scale(0.6); }
      to { opacity: 1; transform: scale(1); }
    }

          return `<section class="visual application-grid">
            <img class="application-board" src="${assets.brandApplications}" alt="לוח יישומי מיתוג מלא: חולצות, דף לוגו, כרטיסיות, מדבקות ושילוט">
          </section>`;
        case "mockup":
          return `<section class="visual"><article class="mockup-card"><img src="${assets.mockup}" alt="הדמיית שילוט כניסה בבית הספר"><div class="mockup-label"><strong>כך זה יכול להיראות בשער</strong><span>דוגמה לסוף המצגת: המיתוג יוצא אל המרחב הבית ספרי.</span></div></article></section>`;
        case "roadmap":
          return `<section class="visual pilot-roadmap">${slide.steps.map((step, i) => `<article class="step-card"><div class="step-number">${i + 1}</div><strong>${step}</strong></article>`).join("")}</section>`;
        default:
          return `<section class="visual empty-visual" aria-hidden="true"></section>`;
      }
    }

    function renderSlide(slide, index) {
      const section = document.createElement("section");
      section.className = `slide ${slide.type || ""} ${slide.visual ? `visual-${slide.visual}` : ""} ${slide.singleLineTitle ? "single-line-title" : ""} ${slide.phase === "rationale" ? "pre-brand" : ""} ${slide.hideLogo ? "hide-logo" : ""} ${slide.dark ? "dark-slide" : ""}`;
      section.setAttribute("aria-label", slide.eyebrow || `שקף ${index + 1}`);
      section.innerHTML = `
        ${header(index, slide)}
        <div class="slide-body">
          ${copyBlock(slide)}
          ${visual(slide)}
        </div>
        ${slide.type === "cover" ? coverRoute() : ""}
        ${slide.type === "closing" || slide.type === "cover" || slide.phase === "rationale" ? "" : `<div class="skyline" aria-hidden="true"><img src="${assets.skyline}" alt=""></div>`}
      `;
      slidesRoot.appendChild(section);
    }

    slides.forEach(renderSlide);
    const slideNodes = [...document.querySelectorAll(".slide")];

    function goTo(index) {
      current = Math.max(0, Math.min(slideNodes.length - 1, index));
      slideNodes.forEach((node, i) => node.classList.toggle("is-active", i === current));
      document.body.classList.toggle("on-dark", slides[current].dark);
    }

    document.querySelector("[data-next]").addEventListener("click", () => goTo(current + 1));
    document.querySelector("[data-prev]").addEventListener("click", () => goTo(current - 1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        goTo(current + 1);
      }
      if (event.key === "ArrowRight" || event.key === "PageUp") {
        event.preventDefault();
        goTo(current - 1);
      }
      if (event.key === "Home") goTo(0);
      if (event.key === "End") goTo(slideNodes.length - 1);
    });

    let touchStartX = null;
    document.addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].clientX;
    }, { passive: true });
    document.addEventListener("touchend", (event) => {
      if (touchStartX === null) return;
      const delta = event.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) > 56) goTo(current + (delta < 0 ? 1 : -1));
      touchStartX = null;
    }, { passive: true });

    goTo(0);
  </script>
</body>
</html>
